plugins {
    id 'com.android.application'
}

android {
    namespace 'com.prank.app'
    compileSdk 33

    defaultConfig {
        applicationId "com.prank.app"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
